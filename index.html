<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Name | Backend Developer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --accent:#e8562d;--accent-soft:#fbe9e2;
    --ink:#1f2733;--ink-soft:#6b7280;
    --bg:#f4f5f7;--card:#fff;--line:#e6e8ec;--dark:#0c0c0d;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;overflow-x:hidden}
  body.locked{overflow:hidden}
  .wrap{max-width:1160px;margin:0 auto;padding:0 24px}
  .eyebrow{color:var(--accent);font-weight:700;letter-spacing:.14em;font-size:14px;text-align:center;margin-bottom:14px}
  .section-title{text-align:center;font-size:clamp(28px,4vw,40px);font-weight:900;letter-spacing:-.02em;margin-bottom:10px}
  .section-sub{text-align:center;color:var(--ink-soft);font-size:16px;margin-bottom:48px}
  section{padding:100px 0}

  /* nav */
  nav{position:fixed;top:22px;left:50%;transform:translateX(-50%);z-index:100;display:flex;align-items:center;gap:6px;background:#fff;border-radius:999px;padding:10px 22px 10px 18px;box-shadow:0 10px 30px rgba(20,20,30,.10)}
  .lights{display:flex;gap:7px;padding-right:14px;margin-right:6px;border-right:1px solid var(--line)}
  .lights span{width:11px;height:11px;border-radius:50%}
  .lights span:nth-child(1){background:#e8562d}.lights span:nth-child(2){background:#f0a48a}.lights span:nth-child(3){background:#f7ccbd}
  nav a{text-decoration:none;color:var(--ink);font-weight:700;font-size:15px;padding:8px 16px;border-radius:999px;transition:background .2s,color .2s}
  nav a:hover{color:var(--accent)}
  nav a.active{background:var(--accent);color:#fff}
  @media(max-width:640px){nav{padding:8px 14px 8px 12px;gap:2px;top:12px}nav a{font-size:13px;padding:6px 10px}.lights{padding-right:8px;margin-right:2px}.lights span{width:9px;height:9px}}

  /* hero */
  .hero{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;background:radial-gradient(600px 400px at 12% 12%,rgba(232,86,45,.10),transparent 60%),radial-gradient(500px 400px at 78% 62%,rgba(232,86,45,.08),transparent 60%),#fbfbfc;padding:120px 24px 60px}
  .hero h1{font-size:clamp(40px,8vw,84px);font-weight:900;line-height:1.12;letter-spacing:-.03em}
  .hero h1 .accent{color:var(--accent)}
  .hero p{color:var(--ink-soft);font-size:clamp(15px,2vw,19px);margin-top:32px;line-height:1.7}
  .socials{display:flex;gap:34px;margin-top:44px}
  .socials a{color:var(--ink-soft);transition:color .2s,transform .2s}
  .socials a:hover{color:var(--accent);transform:translateY(-3px)}
  .socials svg{width:28px;height:28px}

  /* competencies */
  .comp-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:34px}
  .comp-card .thumb{height:230px;border-radius:16px;overflow:hidden;background:linear-gradient(135deg,#eef1f5,#e4e8ee);display:flex;align-items:center;justify-content:center;color:var(--ink-soft);font-size:13px;font-weight:500;margin-bottom:22px}
  .comp-card .thumb img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .4s ease}
  .comp-card:hover .thumb img{transform:scale(1.05)}
  .comp-card .thumb.dark{background:linear-gradient(135deg,#1c2430,#2b3444);color:#8b95a5}
  .comp-card h3{font-size:22px;font-weight:700;margin-bottom:14px}
  .comp-card p{color:var(--ink-soft);font-size:15px;line-height:1.75}

  /* tech */
  .filters{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;margin-bottom:46px}
  .filters button{background:#fff;border:1px solid var(--line);padding:11px 24px;border-radius:999px;font-family:inherit;font-weight:500;font-size:15px;color:var(--ink);cursor:pointer;transition:all .18s}
  .filters button:hover{border-color:var(--accent);color:var(--accent)}
  .filters button.on{background:var(--accent);border-color:var(--accent);color:#fff}
  .tech-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:22px}
  .tech-card{background:#fff;border-radius:16px;aspect-ratio:1/1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;box-shadow:0 4px 18px rgba(20,20,30,.04);transition:transform .35s cubic-bezier(.22,1,.36,1),box-shadow .35s ease,background .35s ease,opacity .35s ease,filter .35s ease}
  .tech-card:hover{transform:translateY(-5px);box-shadow:0 12px 28px rgba(20,20,30,.10)}
  .tech-card.active-pick{transform:translateY(-8px);box-shadow:0 20px 42px rgba(232,86,45,.22),0 6px 16px rgba(20,20,30,.10);opacity:1}
  .tech-card.dimmed{transform:translateY(12px) scale(.95);opacity:1;background:#1c1f26;box-shadow:0 16px 30px rgba(0,0,0,.35),0 4px 10px rgba(0,0,0,.25)}
  .tech-card.dimmed .ic{filter:brightness(.4) contrast(.9)}
  .tech-card.dimmed span{color:#4b515e}
  .tech-card.dimmed:hover{transform:translateY(12px) scale(.95)}
  .tech-card .ic{width:48px;height:48px;display:flex;align-items:center;justify-content:center}
  .tech-card .ic svg{display:block}
  .tech-card span{font-size:14px;font-weight:500}
  @media(max-width:900px){.tech-grid{grid-template-columns:repeat(3,1fr)}}
  @media(max-width:520px){.tech-grid{grid-template-columns:repeat(2,1fr)}}

  /* timeline */
  .timeline{position:relative;max-width:900px;margin:0 auto;padding-left:60px}
  .timeline::before{content:'';position:absolute;left:14px;top:8px;bottom:8px;width:2px;background:var(--line)}
  .tl-item{position:relative;margin-bottom:56px}
  .tl-item::before{content:'';position:absolute;left:-53px;top:4px;width:16px;height:16px;border-radius:50%;background:#fff;border:3px solid var(--accent)}
  .tl-head{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:10px}
  .tl-date{background:var(--accent-soft);color:var(--accent);font-weight:700;font-size:13px;padding:4px 12px;border-radius:999px}
  .tl-org{font-size:20px;font-weight:700}
  .tl-role{font-weight:500;margin-bottom:8px}
  .tl-desc{color:var(--ink-soft);font-size:15px;line-height:1.7;margin-bottom:14px}
  .tl-list{list-style:none;display:flex;flex-direction:column;gap:8px}
  .tl-list li{position:relative;padding-left:18px;color:var(--ink-soft);font-size:15px;line-height:1.6}
  .tl-list li::before{content:'';position:absolute;left:0;top:9px;width:6px;height:6px;border-radius:50%;background:#c3c8d0}

  /* projects */
  .proj-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:28px}
  .proj-card{background:#fff;border-radius:20px;padding:28px;box-shadow:0 4px 20px rgba(20,20,30,.05);transition:transform .18s,box-shadow .18s;cursor:pointer;display:flex;flex-direction:column}
  .proj-card:hover{transform:translateY(-6px);box-shadow:0 16px 36px rgba(20,20,30,.12)}
  .proj-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px}
  .proj-icon{width:56px;height:56px;border-radius:16px;background:var(--accent-soft);display:flex;align-items:center;justify-content:center;font-size:24px;overflow:hidden}
  .proj-icon:has(.proj-logo-img){background:#fff;box-shadow:inset 0 0 0 1px var(--line)}
  .proj-logo-img{width:100%;height:100%;object-fit:contain;padding:6px}
  .proj-badge{background:#fbeecb;color:#d29a12;font-weight:700;font-size:13px;padding:5px 11px;border-radius:999px;display:flex;align-items:center;gap:4px}
  .proj-card h3{font-size:21px;font-weight:700;margin-bottom:10px}
  .proj-card .tagline{color:var(--accent);font-weight:500;font-size:14px;margin-bottom:16px}
  .proj-card .body{color:var(--ink-soft);font-size:14px;line-height:1.7;margin-bottom:22px;flex:1}
  .proj-stack{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .proj-stack .chip{width:34px;height:34px;border-radius:9px;background:#f4f5f7;display:flex;align-items:center;justify-content:center}
  .proj-stack .chip svg{display:block}
  .proj-stack .more{color:var(--ink-soft);font-size:13px;font-weight:600}
  .ic-fallback{display:inline-flex;align-items:center;justify-content:center;border-radius:7px;background:var(--accent-soft);color:var(--accent);font-weight:700}
  @media(max-width:900px){.comp-grid,.proj-grid{grid-template-columns:1fr}}

  /* certificates */
  .subhead{display:flex;align-items:center;gap:12px;max-width:900px;margin:0 auto 34px;font-size:24px;font-weight:700}
  .subhead .badge{width:40px;height:40px;border-radius:12px;background:var(--accent-soft);display:flex;align-items:center;justify-content:center;font-size:20px}
  .cert-timeline{position:relative;max-width:900px;margin:0 auto 40px;padding-left:60px}
  .cert-timeline::before{content:'';position:absolute;left:14px;top:8px;bottom:8px;width:2px;background:var(--line)}
  .cert-item{position:relative;margin-bottom:40px}
  .cert-item::before{content:'';position:absolute;left:-52px;top:2px;width:14px;height:14px;border-radius:50%;background:#fff;border:3px solid #b9c0ca}
  .cert-head{display:flex;align-items:center;gap:14px;margin-bottom:6px}
  .cert-date{background:#eef0f3;color:var(--ink-soft);font-weight:700;font-size:13px;padding:4px 12px;border-radius:8px}
  .cert-name{font-size:19px;font-weight:700}
  .cert-org{color:var(--ink-soft);font-size:14px}

  /* education */
  .edu-row{display:grid;grid-template-columns:230px 1fr;gap:30px;max-width:900px;margin:0 auto 50px}
  .edu-when{color:var(--ink-soft)}
  .edu-when .date{font-weight:700;color:var(--ink);display:block;margin-bottom:4px}
  .edu-when .tag{font-size:13px}
  .edu-body h3{font-size:20px;font-weight:700;margin-bottom:6px}
  .edu-body .major{color:var(--ink-soft);margin-bottom:14px}
  .edu-body ul{list-style:none;display:flex;flex-direction:column;gap:8px}
  .edu-body li{position:relative;padding-left:18px;color:var(--ink-soft);font-size:15px}
  .edu-body li::before{content:'';position:absolute;left:0;top:9px;width:5px;height:5px;border-radius:50%;background:#c3c8d0}
  @media(max-width:640px){.edu-row{grid-template-columns:1fr;gap:10px}}

  /* contact */
  .contact{background:var(--dark);color:#fff;text-align:center;padding:110px 24px 40px}
  .contact .eyebrow{color:var(--accent)}
  .contact h2{font-size:clamp(30px,5vw,44px);font-weight:900;margin-bottom:24px;letter-spacing:-.02em}
  .contact p{color:#9aa0ab;line-height:1.8;font-size:16px;margin-bottom:44px}
  .contact-methods{display:flex;gap:56px;justify-content:center;flex-wrap:wrap;margin-bottom:52px}
  .cm{display:flex;align-items:center;gap:16px;font-size:17px}
  .cm .cm-ic{width:52px;height:52px;border-radius:50%;background:#1c1c1e;display:flex;align-items:center;justify-content:center}
  .cm svg{width:22px;height:22px;color:#fff}
  .contact-socials{display:flex;gap:20px;justify-content:center;margin-bottom:56px}
  .contact-socials a{width:52px;height:52px;border-radius:50%;background:#1c1c1e;display:flex;align-items:center;justify-content:center;color:#9aa0ab;transition:color .2s,background .2s}
  .contact-socials a:hover{color:#fff;background:#2a2a2c}
  .contact-socials svg{width:24px;height:24px}
  .copyright{border-top:1px solid #232326;padding-top:32px;color:#6b7078;font-size:14px}

  /* reveal */
  .reveal{opacity:0;transform:translateY(24px);transition:opacity .6s ease,transform .6s ease}
  .reveal.in{opacity:1;transform:none}

  /* ---------- MODAL ---------- */
  .modal-overlay{position:fixed;inset:0;z-index:200;background:rgba(20,22,28,.55);display:flex;align-items:flex-start;justify-content:center;padding:56px 20px;opacity:0;pointer-events:none;transition:opacity .25s}
  .modal-overlay.open{opacity:1;pointer-events:auto}
  .modal{background:#fff;border-radius:22px;width:100%;max-width:920px;max-height:calc(100vh - 112px);overflow-y:auto;padding:44px 48px;transform:translateY(18px) scale(.98);transition:transform .25s;box-shadow:0 30px 80px rgba(0,0,0,.3)}
  .modal-overlay.open .modal{transform:none}
  .modal-close{position:absolute;top:16px;right:20px;width:40px;height:40px;border:none;background:transparent;color:var(--ink-soft);font-size:26px;cursor:pointer;border-radius:10px;line-height:1;transition:background .15s,color .15s}
  .modal-close:hover{background:#f1f2f5;color:var(--ink)}
  .modal{position:relative}
  .m-icon{width:72px;height:72px;border-radius:18px;background:var(--accent-soft);display:flex;align-items:center;justify-content:center;font-size:34px;margin-bottom:22px;overflow:hidden}
  .m-icon:has(.proj-logo-img){background:#fff;box-shadow:inset 0 0 0 1px var(--line)}
  .m-titlerow{display:flex;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:6px}
  .m-title{font-size:34px;font-weight:900;letter-spacing:-.02em}
  .m-taglinerow{display:flex;align-items:center;gap:14px;margin-bottom:34px}
  .m-tagline{font-size:17px;color:var(--ink-soft);font-weight:500}
  .m-link{color:var(--ink-soft);display:flex;align-items:center}
  .m-link:hover{color:var(--accent)}
  .m-link svg{width:20px;height:20px}
  .m-meta{display:flex;gap:70px;flex-wrap:wrap;margin-bottom:32px}
  .m-meta .label{color:var(--ink-soft);font-size:14px;font-weight:500;margin-bottom:8px}
  .m-meta .val{font-size:17px;font-weight:700}
  .m-block-label{color:var(--ink-soft);font-size:14px;font-weight:500;margin-bottom:12px}
  .m-summary{font-size:16px;line-height:1.75;font-weight:500;margin-bottom:30px}
  .m-role{list-style:none;display:flex;flex-direction:column;gap:10px;margin-bottom:30px}
  .m-role li{position:relative;padding-left:22px;font-size:15px;line-height:1.6;color:#3a4250}
  .m-role li::before{content:'';position:absolute;left:0;top:8px;width:8px;height:8px;border-radius:3px;background:var(--accent)}
  .m-stack{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:8px}
  .m-stack .chip{height:40px;padding:0 14px;border-radius:12px;background:#f6f7f9;border:1px solid var(--line);display:flex;align-items:center;gap:8px}
  .m-stack .chip svg{display:block;flex-shrink:0}
  .m-stack .chip em{font-style:normal;font-size:13px;font-weight:600;color:var(--ink)}
  .m-divider{height:1px;background:var(--line);margin:36px 0}
  .m-section-title{font-size:24px;font-weight:700;margin-bottom:18px}
  .m-overview p{font-size:16px;line-height:1.85;color:#3a4250;margin-bottom:16px}
  .m-details{counter-reset:d;list-style:none}
  .m-detail{display:flex;gap:16px;margin-bottom:26px}
  .m-detail .num{counter-increment:d;color:var(--ink-soft);font-weight:700;font-size:18px;min-width:20px}
  .m-detail .num::before{content:counter(d) "."}
  .m-detail h4{font-size:18px;font-weight:700;margin-bottom:12px}
  .m-detail ul{list-style:none;display:flex;flex-direction:column;gap:8px}
  .m-detail li{position:relative;padding-left:18px;color:var(--ink-soft);font-size:15px;line-height:1.65}
  .m-detail li::before{content:'';position:absolute;left:0;top:9px;width:6px;height:6px;border-radius:50%;background:#c3c8d0}
  .m-arch{margin:30px 0}
  .m-arch img{width:100%;border-radius:14px;border:1px solid var(--line);cursor:zoom-in;transition:opacity .15s}
  .m-arch img:hover{opacity:.92}
  .arch-lightbox{position:fixed;inset:0;z-index:300;background:rgba(10,12,16,.9);display:none;align-items:center;justify-content:center;padding:32px;cursor:zoom-out}
  .arch-lightbox.open{display:flex}
  .arch-lightbox img{max-width:100%;max-height:100%;border-radius:10px;box-shadow:0 20px 60px rgba(0,0,0,.5)}
  .m-awards-title{display:flex;align-items:center;gap:10px;color:#d29a12;font-weight:700;letter-spacing:.06em;font-size:15px;margin-bottom:16px}
  .m-awards{list-style:none;display:flex;flex-direction:column;gap:12px}
  .m-awards li{position:relative;padding-left:20px;font-weight:500}
  .m-awards li::before{content:'';position:absolute;left:0;top:9px;width:7px;height:7px;border-radius:50%;background:#e6b53d}
  @media(max-width:640px){.modal{padding:32px 22px}.m-title{font-size:26px}.m-meta{gap:32px}}

  @media(prefers-reduced-motion:reduce){
    html{scroll-behavior:auto}
    .reveal{opacity:1;transform:none;transition:none}
    .modal,.modal-overlay{transition:none}
    .tech-card{transition:opacity .2s ease}
    .tech-card.active-pick,.tech-card.dimmed{transform:none}
  }
</style>
</head>
<body>

<nav id="nav">
  <div class="lights"><span></span><span></span><span></span></div>
  <a href="#tech">기술</a><a href="#experience">경험</a><a href="#projects">프로젝트</a><a href="#awards">수상</a><a href="#education">교육</a>
</nav>

<header class="hero" id="top">
  <h1 id="heroTitle"></h1>
  <p id="heroSub"></p>
  <div class="socials" id="heroSocials"></div>
</header>

<section id="competencies"><div class="wrap">
  <p class="eyebrow reveal" id="compEyebrow"></p>
  <h2 class="section-title reveal" id="compTitle"></h2>
  <div style="height:36px"></div>
  <div class="comp-grid" id="compGrid"></div>
</div></section>

<section id="tech"><div class="wrap">
  <p class="eyebrow reveal">TECH STACK</p>
  <h2 class="section-title reveal">기술 스택</h2>
  <div style="height:36px"></div>
  <div class="filters reveal" id="techFilters"></div>
  <div class="tech-grid" id="techGrid"></div>
</div></section>

<section id="experience"><div class="wrap">
  <p class="eyebrow reveal">EXPERIENCE</p>
  <h2 class="section-title reveal">경험</h2>
  <div style="height:50px"></div>
  <div class="timeline" id="expTimeline"></div>
</div></section>

<section id="projects"><div class="wrap">
  <p class="eyebrow reveal">PROJECTS</p>
  <h2 class="section-title reveal">프로젝트 경험</h2>
  <p class="section-sub reveal">주요 프로젝트의 세부 사항을 확인해보세요</p>
  <div class="proj-grid" id="projGrid"></div>
</div></section>

<section id="awards"><div class="wrap">
  <p class="eyebrow reveal">AWARDS &amp; CERTIFICATES</p>
  <h2 class="section-title reveal">수상 및 자격증</h2>
  <div style="height:56px"></div>
  <div class="subhead reveal"><span class="badge">🏆</span> Awards</div>
  <div class="timeline" id="awardTimeline"></div>
  <div style="height:40px"></div>
  <div class="subhead reveal"><span class="badge">🎖️</span> Certificates</div>
  <div class="cert-timeline" id="certTimeline"></div>
</div></section>

<section id="education"><div class="wrap">
  <p class="eyebrow reveal">EDUCATION</p>
  <h2 class="section-title reveal">교육</h2>
  <div style="height:56px"></div>
  <div id="eduList"></div>
</div></section>

<footer class="contact" id="contact">
  <p class="eyebrow">CONTACT</p>
  <h2>읽어주셔서 감사합니다.</h2>
  <p>새로운 도전을 두려워하지 않고, 끊임없이 배우며 성장하는 개발자가 되겠습니다.<br>궁금한 점이 있으시다면 언제든 연락주세요.</p>
  <div class="contact-methods" id="contactMethods"></div>
  <div class="contact-socials" id="contactSocials"></div>
  <div class="copyright" id="copyright"></div>
</footer>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="mTitle">
    <button class="modal-close" id="modalClose" aria-label="닫기">&times;</button>
    <div id="modalBody"></div>
  </div>
</div>

<!-- architecture lightbox -->
<div class="arch-lightbox" id="archLightbox"><img id="archLightboxImg" src="" alt=""></div>

function projIcon(icon){
  if(typeof icon==='string' && (icon.startsWith('data:')||icon.startsWith('http')||icon.startsWith('./')||icon.startsWith('assets/'))){
    return `<img src="${esc(icon)}" alt="" class="proj-logo-img">`;
  }
  return esc(icon);
}
function techIcon(name, size){
  const key=String(name).toLowerCase().trim();
  const t=TECH[key];
  const s=size||24;
  if(t){
    if(t.grad){
      const gid='g'+key.replace(/[^a-z0-9]/g,'');
      const stops=t.grad.map((c,i)=>`<stop offset="${Math.round(i/(t.grad.length-1)*100)}%" stop-color="${c}"/>`).join('');
      return `<svg viewBox="${t.vb}" width="${s}" height="${s}" aria-hidden="true"><defs><linearGradient id="${gid}" x1="0" y1="1" x2="1" y2="0">${stops}</linearGradient></defs><path fill="url(#${gid})" d="${t.p}"/></svg>`;
    }
    return `<svg viewBox="${t.vb}" width="${s}" height="${s}" fill="${t.c}" aria-hidden="true"><path d="${t.p}"/></svg>`;
  }
  const init=name.replace(/[^A-Za-z0-9가-힣]/g,'').slice(0,2)||'·';
  return `<span class="ic-fallback" style="width:${s}px;height:${s}px;font-size:${Math.round(s*0.42)}px">${esc(init)}</span>`;
}

async function loadData(){
  try{
    const res = await fetch('data.json',{cache:'no-store'});
    if(res.ok) return await res.json();
  }catch(e){}
  return JSON.parse(document.getElementById('portfolio-data').textContent);
}

function render(d){
  // hero
  const p = d.profile;
  const [l1,l2,l3] = p.heroLines;
  document.getElementById('heroTitle').innerHTML =
    `${esc(l1)}<br>${esc(l2)}<br><span class="accent">${esc((l3||'').replace('입니다.',''))}</span>입니다.`;
  document.getElementById('heroSub').innerHTML = p.heroSub.map(esc).join('<br>');
  document.getElementById('heroSocials').innerHTML =
    `${p.github?`<a href="${esc(p.github)}" target="_blank" rel="noopener" aria-label="GitHub">${ICONS.github}</a>`:''}
     ${p.linkedin?`<a href="${esc(p.linkedin)}" target="_blank" rel="noopener" aria-label="LinkedIn">${ICONS.linkedin}</a>`:''}
     <a href="mailto:${esc(p.email)}" aria-label="Email">${ICONS.email}</a>`;

  // competencies
  document.getElementById('compEyebrow').textContent = d.competencies.eyebrow;
  document.getElementById('compTitle').textContent = d.competencies.title;
  document.getElementById('compGrid').innerHTML = d.competencies.items.map(c=>`
    <div class="comp-card reveal">
      <div class="thumb ${c.theme==='dark'?'dark':''}">${c.image?`<img src="${esc(c.image)}" alt="${esc(c.title)}" loading="lazy">`:'[이미지 자리]'}</div>
      <h3>${esc(c.title)}</h3><p>${esc(c.desc)}</p>
    </div>`).join('');

  // tech
  const cats=[['all','All'],['backend','Backend'],['database','Database'],['infra','Infra/Cloud'],['etc','Etc']];
  const fWrap=document.getElementById('techFilters');
  fWrap.innerHTML=cats.map(([v,l],i)=>`<button data-cat="${v}" class="${i===0?'on':''}">${l}</button>`).join('');
  const tGrid=document.getElementById('techGrid');
  // render all cards once, keep them in DOM
  tGrid.innerHTML=d.tech.map(t=>`<div class="tech-card" data-cat="${esc(t.cat)}"><div class="ic">${techIcon(t.name,34)}</div><span>${esc(t.name)}</span></div>`).join('');
  const applyFilter=cat=>{
    tGrid.querySelectorAll('.tech-card').forEach(card=>{
      const active = (cat==='all' || card.dataset.cat===cat);
      card.classList.toggle('dimmed', !active);
      card.classList.toggle('active-pick', cat!=='all' && active);
    });
  };
  applyFilter('all');
  fWrap.querySelectorAll('button').forEach(b=>b.addEventListener('click',()=>{
    fWrap.querySelectorAll('button').forEach(x=>x.classList.remove('on'));
    b.classList.add('on');applyFilter(b.dataset.cat);
  }));

  // experience
  document.getElementById('expTimeline').innerHTML=d.experience.map(e=>`
    <div class="tl-item reveal">
      <div class="tl-head"><span class="tl-date">${esc(e.date)}</span><span class="tl-org">${esc(e.org)}</span></div>
      <p class="tl-role">${esc(e.role)}</p>
      <p class="tl-desc">${esc(e.desc)}</p>
      <ul class="tl-list">${e.points.map(x=>`<li>${esc(x)}</li>`).join('')}</ul>
    </div>`).join('');

  // projects
  document.getElementById('projGrid').innerHTML=d.projects.map((pr,i)=>{
    const shown=(pr.stackFull||[]).slice(0,5);
    const hidden=(pr.stackFull||[]).length-shown.length;
    const chips=shown.map(s=>`<span class="chip" title="${esc(s)}">${techIcon(s,20)}</span>`).join('');
    const more=hidden>0?`<span class="more">+${hidden}</span>`:'';
    const badge=pr.awardCount?`<span class="proj-badge">🏆 ${pr.awardCount}</span>`:'';
    return `<div class="proj-card reveal" data-idx="${i}">
      <div class="proj-top"><div class="proj-icon">${projIcon(pr.icon)}</div>${badge}</div>
      <h3>${esc(pr.title)}</h3><p class="tagline">${esc(pr.tagline)}</p>
      <p class="body">${esc(pr.cardBody)}</p>
      <div class="proj-stack">${chips}${more}</div></div>`;
  }).join('');
  document.querySelectorAll('.proj-card').forEach(card=>
    card.addEventListener('click',()=>openModal(d.projects[+card.dataset.idx])));

  // awards (hide section header if empty)
  const awardsBlock=document.querySelector('#awards .subhead');
  if(!d.awards||!d.awards.length){
    awardsBlock.style.display='none';
    document.getElementById('awardTimeline').style.display='none';
  }
  document.getElementById('awardTimeline').innerHTML=(d.awards||[]).map(a=>`
    <div class="tl-item reveal">
      <div class="tl-head"><span class="tl-date">${esc(a.date)}</span><span class="tl-org">${esc(a.name)}</span><span class="tl-date">${esc(a.grade)}</span></div>
      <p class="tl-desc">${esc(a.desc)}</p>
    </div>`).join('');

  // certificates
  document.getElementById('certTimeline').innerHTML=d.certificates.map(c=>`
    <div class="cert-item reveal">
      <div class="cert-head"><span class="cert-date">${esc(c.date)}</span><span class="cert-name">${esc(c.name)}</span></div>
      <p class="cert-org">${esc(c.org)}</p>
    </div>`).join('');

  // education
  document.getElementById('eduList').innerHTML=d.education.map(e=>`
    <div class="edu-row reveal">
      <div class="edu-when"><span class="date">${esc(e.date)}</span><span class="tag">${esc(e.status||'')}</span></div>
      <div class="edu-body"><h3>${esc(e.school)}</h3><p class="major">${esc(e.major)}</p>
        <ul>${e.points.map(x=>`<li>${esc(x)}</li>`).join('')}</ul></div>
    </div>`).join('');

  // contact
  document.getElementById('contactMethods').innerHTML=`
    <div class="cm"><span class="cm-ic">${ICONS.email}</span>${esc(p.email)}</div>
    <div class="cm"><span class="cm-ic">${ICONS.phone}</span>${esc(p.phone)}</div>`;
  document.getElementById('contactSocials').innerHTML=`
    ${p.github?`<a href="${esc(p.github)}" target="_blank" rel="noopener" aria-label="GitHub">${ICONS.github}</a>`:''}
    ${p.linkedin?`<a href="${esc(p.linkedin)}" target="_blank" rel="noopener" aria-label="LinkedIn">${ICONS.linkedin}</a>`:''}`;
  document.getElementById('copyright').textContent=`© 2026 ${p.name}. All rights reserved.`;

  // reveal + nav
  const io=new IntersectionObserver(en=>en.forEach(e=>{if(e.isIntersecting){e.target.classList.add('in');io.unobserve(e.target)}}),{threshold:.12});
  document.querySelectorAll('.reveal').forEach(el=>io.observe(el));
  const navLinks=[...document.querySelectorAll('#nav a')];
  const secs=navLinks.map(a=>document.querySelector(a.getAttribute('href')));
  const onScroll=()=>{let idx=-1;secs.forEach((s,i)=>{if(s&&s.getBoundingClientRect().top<=180)idx=i});navLinks.forEach(a=>a.classList.remove('active'));if(idx>=0)navLinks[idx].classList.add('active');};
  window.addEventListener('scroll',onScroll,{passive:true});onScroll();
}

const overlay=document.getElementById('modalOverlay');
const modalBody=document.getElementById('modalBody');
function openModal(pr){
  const meta=`
    <div class="m-meta">
      <div><div class="label">기간</div><div class="val">${esc(pr.period)}</div></div>
      <div><div class="label">역할</div><div class="val">${esc(pr.position)}</div></div>
      <div><div class="label">참여인원</div><div class="val">${esc(pr.members)}</div></div>
    </div>`;
  const links=`${pr.links&&pr.links.demo?`<a class="m-link" href="${esc(pr.links.demo)}" target="_blank" rel="noopener" aria-label="데모">${ICONS.ext}</a>`:''}${pr.links&&pr.links.github?`<a class="m-link" href="${esc(pr.links.github)}" target="_blank" rel="noopener" aria-label="GitHub">${ICONS.github}</a>`:''}`;
  const stack=`<div class="m-block-label">기술 스택</div><div class="m-stack">${pr.stackFull.map(s=>`<span class="chip" title="${esc(s)}">${techIcon(s,26)}<em>${esc(s)}</em></span>`).join('')}</div>`;
  const myRole=pr.myRole&&pr.myRole.length?`<div class="m-block-label">담당 역할</div><ul class="m-role">${pr.myRole.map(r=>`<li>${esc(r)}</li>`).join('')}</ul>`:'';
  const overview=pr.overview&&pr.overview.length?`<div class="m-section-title">프로젝트 개요</div><div class="m-overview">${pr.overview.map(x=>`<p>${esc(x)}</p>`).join('')}</div>`:'';
  const details=pr.details&&pr.details.length?`<div class="m-section-title">상세 내용</div><ol class="m-details">${pr.details.map(dt=>`<li class="m-detail"><span class="num"></span><div><h4>${esc(dt.heading)}</h4><ul>${dt.bullets.map(b=>`<li>${esc(b)}</li>`).join('')}</ul></div></li>`).join('')}</ol>`:'';
  const arch=`<div class="m-arch">${pr.architectureImage?`<div class="m-section-title" style="font-size:20px">아키텍처</div><img src="${esc(pr.architectureImage)}" alt="${esc(pr.title)} 아키텍처 다이어그램" class="arch-zoomable" loading="lazy">`:''}</div>`;
  const awards=pr.awards&&pr.awards.length?`<div class="m-divider"></div><div class="m-awards-title">${ICONS.ribbon} AWARDS</div><ul class="m-awards">${pr.awards.map(a=>`<li>${esc(a)}</li>`).join('')}</ul>`:'';

  modalBody.innerHTML=`
    <div class="m-icon">${projIcon(pr.icon)}</div>
    <div class="m-titlerow"><h2 class="m-title" id="mTitle">${esc(pr.title)}</h2></div>
    <div class="m-taglinerow"><span class="m-tagline">${esc(pr.tagline)}</span>${links}</div>
    ${meta}
    <div class="m-block-label">프로젝트 요약</div><p class="m-summary">${esc(pr.summary)}</p>
    ${myRole}
    ${stack}
    <div class="m-divider"></div>
    ${overview}${details}${arch}${awards}`;
  overlay.classList.add('open');
  document.body.classList.add('locked');
  document.getElementById('modalClose').focus();
}
function closeModal(){overlay.classList.remove('open');document.body.classList.remove('locked');modalBody.scrollTop=0;overlay.querySelector('.modal').scrollTop=0;}
document.getElementById('modalClose').addEventListener('click',closeModal);

// architecture lightbox
const archLb=document.getElementById('archLightbox');
const archLbImg=document.getElementById('archLightboxImg');
document.getElementById('modalBody').addEventListener('click',e=>{
  const img=e.target.closest('.arch-zoomable');
  if(img){archLbImg.src=img.src;archLb.classList.add('open');}
});
archLb.addEventListener('click',()=>{archLb.classList.remove('open');archLbImg.src='';});
document.addEventListener('keydown',e=>{if(e.key==='Escape'&&archLb.classList.contains('open')){archLb.classList.remove('open');archLbImg.src='';}});
overlay.addEventListener('click',e=>{if(e.target===overlay)closeModal();});
document.addEventListener('keydown',e=>{if(e.key==='Escape'&&overlay.classList.contains('open'))closeModal();});

loadData().then(render);
</script>
</body>
</html>
